        function init() {
            const saved = localStorage.getItem('novark_reg');
            if (saved) { curLang = saved; document.getElementById('language-overlay').remove(); }
            
            const grid = document.getElementById('langGrid');
            languages.forEach(l => {
                const div = document.createElement('div');
                div.className = "lang-card p-6 flex flex-col items-center gap-3";
                div.innerHTML = `<span class="text-4xl">${l.flag}</span><p class="text-[10px] font-black uppercase tracking-widest text-white/80">${l.label}</p>`;
                div.onclick = () => setLang(l.code);
                grid.appendChild(div);
            });
            applyTranslations();
            AOS.init({ duration: 800, once: true });
        }

        function setLang(c) {
            curLang = c;
            if (document.getElementById('rememberLang').checked) localStorage.setItem('novark_reg', c);
            document.getElementById('language-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('language-overlay').remove(), 500);
            applyTranslations();
        }

        function applyTranslations() {
            const t = i18n[curLang];
            document.getElementById('catalogSearch').placeholder = t.search;
            document.getElementById('btn-back-text').innerText = t.back;
            document.getElementById('req-view-title').innerText = t.request;
            document.getElementById('req-btn').innerText = t.send;
            document.getElementById('label-no-ask').innerText = t.noAsk;
            document.getElementById('lbl-games').innerText = t.games;
            document.getElementById('lbl-movies').innerText = t.movies;
            document.getElementById('lbl-all').innerText = t.all;
            document.getElementById('lbl-req').innerText = t.request;
            document.getElementById('header-flag').innerText = t.flag;
            render();
        }

        function render() {
            const val = document.getElementById('catalogSearch').value.toLowerCase();
            let pool = [];
            if (currentCategory === 'all') pool = [...games, ...movies];
            else if (currentCategory === 'games') pool = games;
            else pool = movies;

            const filtered = pool.filter(g => g.title.toLowerCase().includes(val));
            const t = i18n[curLang];

            document.getElementById('gameGrid').innerHTML = filtered.map(g => `
                <div class="content-card" onclick="openItem('${g.id}')">
                    <div class="poster-wrapper">
                        ${g.showNewBadge ? `<div class="badge-tag">${t.new}</div>` : ''}
                        ${g.isMostWanted ? `<div class="badge-tag !bg-white !text-black !border-none">${t.hot}</div>` : ''}
                        <img src="${g.poster}" class="poster-img">
                        <div class="card-overlay">
                            <p class="font-brand text-lg leading-tight uppercase text-white">${g.title}</p>
                        </div>
                    </div>
                </div>`).join('');
        }

        function openItem(id) {
            const g = [...games, ...movies].find(x => x.id === id);
            const t = i18n[curLang];
            document.getElementById('detailImg').src = g.poster;
            document.getElementById('detailTitle').innerText = g.title;
            document.getElementById('detailDesc').innerText = g.desc[curLang] || g.desc.en;
            
            document.getElementById('reqsContainer').innerHTML = g.reqs.map(r => `
                <div class="bg-white/5 px-3 py-1.5 rounded-lg border border-white/5 text-[9px] font-bold text-cyan-400/80 uppercase">
                    ${r}
                </div>`).join('');
            
            let htmlArea = '';
            if (g.multiVersion) {
                htmlArea = `
                    <button onclick="window.open('${g.links.mex}','_blank')" class="btn-variant">
                        <span>Latam Server (Mexico)</span> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                    </button>
                    <button onclick="window.open('${g.links.usa}','_blank')" class="btn-variant">
                        <span>Global Server (USA)</span> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                    </button>`;
            } else {
                const actionText = g.type === 'movie' ? t.play : t.download;
                htmlArea = `<button onclick="window.open('${g.link}','_blank')" class="btn-action">${actionText}</button>`;
            }
            
            document.getElementById('downloadArea').innerHTML = htmlArea;
            navigate('detail');
        }

        function navigate(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(v + '-view').classList.remove('hidden');
            window.scrollTo(0, 0);
            
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            if(v === 'home' && document.getElementById('nav-btn-' + currentCategory)) {
                document.getElementById('nav-btn-' + currentCategory).classList.add('active');
            }
            if(v === 'request') document.getElementById('nav-btn-req').classList.add('active');
        }

        function switchCategory(c) {
            currentCategory = c;
            navigate('home');
            render();
        }

        function sendRequest() {
            const btn = document.getElementById('req-btn');
            const input = document.getElementById('requestInput');
            if(!input.value) return;
            btn.innerText = "...";
            setTimeout(() => {
                btn.innerText = "SENT";
                btn.classList.add('!bg-cyan-400');
                input.value = "";
                setTimeout(() => { 
                    btn.innerText = i18n[curLang].send; 
                    btn.classList.remove('!bg-cyan-400');
                }, 2000);
            }, 1000);
        }

        function resetLanguage() {
            localStorage.removeItem('novark_reg');
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
