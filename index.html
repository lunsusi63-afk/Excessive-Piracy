                <div onclick="setLang('${code}')" class="group p-5 glass-panel cursor-pointer hover:border-cyan-400/50 hover:bg-cyan-400/5 transition-all text-center">
                    <span class="text-3xl block mb-2">${flags[code] || '🌐'}</span>
                    <span class="font-ui text-[10px] text-white/50 uppercase tracking-[0.2em] group-hover:text-cyan-400">${i18n[code].name}</span>
                </div>
            `).join('');

            window.addEventListener('scroll', () => {
                document.getElementById('main-header').classList.toggle('scrolled', window.scrollY > 30);
            });

            applyTranslations(); 
            AOS.init({ duration: 400, once: true, offset: 50 }); 
        };

        window.setLang = (code) => {
            curLang = code;
            if(document.getElementById('rememberLang').checked) localStorage.setItem('ep_lang', code);
            applyTranslations(); 
            document.getElementById('language-overlay').classList.add('opacity-0', 'pointer-events-none');
            document.body.classList.remove('lock-scroll');
        };

        function applyTranslations() {
            const t = i18n[curLang] || i18n.en;
            // Header & Menu
            document.getElementById('catalogSearch').placeholder = t.search;
            document.getElementById('nav-catalog').innerText = t.catalog;
            document.getElementById('nav-request').innerText = t.request;
            document.getElementById('nav-changelang').innerText = t.changelang;
            document.getElementById('nav-report-page').innerText = t.reportPage;
            
            // Home View
            document.getElementById('banner-tag').innerText = t.bannerTag;
            document.getElementById('banner-title').innerHTML = t.bannerTitle;
            document.getElementById('tab-games').innerText = t.gamesTab;
            document.getElementById('tab-movies').innerText = t.moviesTab;
            document.getElementById('counter-label').innerText = t.available;
            
            // Detail View
            document.getElementById('btn-back-text').innerText = t.back;
            document.getElementById('verified-label').innerText = t.verifiedBy;
            document.getElementById('reportBtn').innerText = t.report;
            document.getElementById('reportMessage').placeholder = t.reportPlace;
            document.getElementById('report-send-btn').innerText = t.reportSend;
            
            // Request View
            document.getElementById('req-view-title').innerText = t.request;
            document.getElementById('req-view-tag').innerText = t.reqTag;
            document.getElementById('requestInput').placeholder = t.placeholder;
            document.getElementById('req-btn').innerText = t.send;
            
            // Overlay
            document.getElementById('label-no-ask').innerText = t.noAsk;

            render();
            
            if(currentGameId && !document.getElementById('detail-view').classList.contains('hidden')) {
                updateDetailLabels();
            }
        }

        window.switchCategory = (cat) => {
            currentCategory = cat;
            document.getElementById('tab-games').classList.toggle('active', cat === 'games');
            document.getElementById('tab-movies').classList.toggle('active', cat === 'movies');
            render();
        };

        window.render = () => {
            const val = document.getElementById('catalogSearch').value.toLowerCase();
            const grid = document.getElementById('gameGrid');
            const pool = currentCategory === 'games' ? games : movies;
            const filtered = pool.filter(g => g.title.toLowerCase().includes(val));
            const t = i18n[curLang] || i18n.en;
            
            document.getElementById('game-total-count').innerText = filtered.length;
            
            grid.innerHTML = filtered.map((g, i) => `
                <div class="game-card" data-aos="fade-up" data-aos-delay="\( {i * 20}" onclick="openItem(' \){g.id}')">
                    \( {g.isMostWanted ? `<div class="badge-hot"> \){t.wanted}</div>` : ''}
                    \( {g.id === 'p5' ? `<div class="badge-update"> \){t.updateAlways}</div>` : ''}
                    \( {g.showNewBadge && !g.isMostWanted ? `<div class="badge-new"> \){t.new}</div>` : ''}
                    <img src="${g.poster}" class="char-img" loading="lazy">
                    <div class="card-info">
                        <p class="text-[10px] font-bold uppercase tracking-wider text-white truncate">${g.title}</p>
                    </div>
                </div>
            `).join('');
        };

        function updateDetailLabels() {
            const g = [...games, ...movies].find(x => x.id === currentGameId);
            if(!g) return;

            const isMovie = g.type === 'movie';
            const t = i18n[curLang] || i18n.en;
            
            document.getElementById('detailDesc').innerText = g.desc[curLang] || g.desc.en || g.desc.es;
            document.getElementById('reqsContainer').innerHTML = `
                <div class="grid grid-cols-2 gap-4 p-4 glass-panel">
                    <div><p class="text-[8px] opacity-30 font-bold tracking-widest uppercase mb-1">\( {isMovie ? t.res : t.ram}</p><p class="text-[10px] font-bold"> \){g.reqs[0]}</p></div>
                    <div><p class="text-[8px] opacity-30 font-bold tracking-widest uppercase mb-1">\( {isMovie ? t.lang : t.cpu}</p><p class="text-[10px] font-bold"> \){g.reqs[1]}</p></div>
                    <div><p class="text-[8px] opacity-30 font-bold tracking-widest uppercase mb-1">\( {isMovie ? t.source : t.storage}</p><p class="text-[10px] font-bold"> \){g.reqs[2]}</p></div>
                    <div><p class="text-[8px] opacity-30 font-bold tracking-widest uppercase mb-1">\( {isMovie ? t.year : t.version}</p><p class="text-[10px] font-bold"> \){g.reqs[3]}</p></div>
                </div>`;

            if (g.multiVersion) {
                document.getElementById('downloadArea').innerHTML = `
                    <div class="flex flex-col gap-3">
                        <button onclick="handleDownload('\( {g.id}', ' \){g.links.mex}')" class="download-btn flex items-center justify-center gap-4">
                            <span>🇲🇽</span> ${t.downloadMovie} (MEX)
                        </button>
                        <button onclick="handleDownload('\( {g.id}', ' \){g.links.usa}')" class="download-btn flex items-center justify-center gap-4 bg-white/10 text-white border border-white/20">
                            <span>🇺🇸</span> ${t.downloadMovie} (USA)
                        </button>
                    </div>`;
            } else {
                document.getElementById('downloadArea').innerHTML = `
                    <button onclick="handleDownload('\( {g.id}', ' \){g.link}')" class="download-btn">
                        ${isMovie ? t.downloadMovie : t.download}
                    </button>`;
            }
        }

        window.openItem = (id) => {
            scrollPos = window.scrollY;
            const g = [...games, ...movies].find(x => x.id === id);
            currentGameId = id;
            document.getElementById('reportTerminal').classList.add('hidden');
            document.getElementById('detailImg').src = g.screen;
            document.getElementById('detailTitle').innerText = g.title;
            
            updateDetailLabels();
            
            showView('detail'); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.handleDownload = (id, link) => {
            const g = [...games, ...movies].find(x => x.id === id); 
            window.open(link, '_blank');
            fetch(WEBHOOK_DOWNLOADS, { 
                method: 'POST', headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({ 
                    embeds: [{ 
                        title: g.type === 'movie' ? "🎬 Reproducción" : "🚀 Descarga", 
                        color: 62207, 
                        thumbnail: { url: g.poster },
                        fields: [
                            {name: "Título", value: g.title, inline: true}, 
                            {name: "Idioma Web", value: curLang, inline: true},
                            {name: "Tipo", value: g.type === 'movie' ? "Película" : "Juego APK", inline: true}
                        ] 
                    }] 
                }) 
            }).catch(() => {});
        };

        window.toggleReportTerminal = () => document.getElementById('reportTerminal').classList.toggle('hidden');

        window.showReportTerminalFromMenu = () => {
            currentGameId = "WEB_ERROR";
            document.getElementById('detailTitle').innerText = i18n[curLang].reportPage;
            document.getElementById('detailDesc').innerText = "Report system malfunctions here.";
            document.getElementById('reqsContainer').innerHTML = "";
            document.getElementById('downloadArea').innerHTML = "";
            showView('detail');
            document.getElementById('reportTerminal').classList.remove('hidden');
        };

        window.sendReport = async () => {
            const msg = document.getElementById('reportMessage').value; if(!msg) return;
            const g = [...games, ...movies].find(x => x.id === currentGameId) || { title: "Error General", poster: "https://i.ibb.co/G4Z5gvHw/icon.png" };
            
            await fetch(WEBHOOK_REPORTS, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ 
                    embeds: [{ 
                        title: "⚠️ REPORTE DE FALLA", 
                        color: 16711680, 
                        thumbnail: { url: g.poster },
                        fields: [
                            { name: "Producto", value: g.title }, 
                            { name: "Mensaje de Usuario", value: msg } 
                        ] 
                    }] 
                })
            }).catch(() => {});
            document.getElementById('reportMessage').value = "ENVIADO / SENT";
            setTimeout(() => toggleReportTerminal(), 2000);
        };

        window.showView = (v) => {
            document.querySelectorAll('.view-section').forEach(s => {
                s.classList.add('hidden');
                s.classList.remove('block');
            });
            const active = document.getElementById(v + '-view');
            active.classList.remove('hidden');
            active.classList.add('block');
        };

        window.navigate = (v) => { 
            showView(v); 
            if(v === 'home') {
                currentGameId = null;
                setTimeout(() => window.scrollTo({ top: scrollPos, behavior: 'auto' }), 50);
            }
        };

        window.toggleMenu = () => {
            const menu = document.getElementById('mobile-menu');
            const overlay = document.getElementById('mobile-menu-overlay');
            const isOpen = menu.style.right === '0px';
            menu.style.right = isOpen ? '-100%' : '0px';
            overlay.classList.toggle('hidden', isOpen);
            setTimeout(() => overlay.style.opacity = isOpen ? '0' : '1', 10);
        };

        window.sendRequest = async () => {
            const val = document.getElementById('requestInput').value; if(!val) return;
            await fetch(WEBHOOK_REQUESTS, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ embeds: [{ title: "📝 Petición de Contenido", color: 0x00f2ff, fields: [{ name: "Título solicitado", value: val }] }] }) }).catch(() => {});
            document.getElementById('requestInput').value = ""; 
            document.getElementById('req-btn').innerText = "DONE / ENVIADO";
            setTimeout(() => { document.getElementById('req-btn').innerText = i18n[curLang].send; }, 3000);
        };

        window.resetLanguage = () => { localStorage.removeItem('ep_lang'); location.reload(); };

        window.onload = init;
    </script>
</body>
</html>
