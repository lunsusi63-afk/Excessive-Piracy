        function init() {
            const grid = document.getElementById('langGrid');
            grid.innerHTML = '';
            languages.forEach(lang => {
                const btn = document.createElement('div');
                btn.className = `lang-btn`;
                btn.innerHTML = `<span class="text-3xl">${lang.flag}</span><span class="text-[9px] font-black uppercase">${lang.name}</span>`;
                btn.onclick = () => selectLanguage(lang.code);
                grid.appendChild(btn);
            });
        }

        function selectLanguage(code) {
            currentLang = languages.find(l => l.code === code) || languages[0];
            const t = currentLang.texts;
            document.getElementById('home-title').innerHTML = t.home;
            document.getElementById('req-title').innerHTML = t.req;
            document.getElementById('nav-home').innerText = t.navHome;
            document.getElementById('nav-request').innerText = t.navReq;
            document.getElementById('req-btn').innerText = t.reqBtn;
            document.getElementById('back-btn').innerText = t.back;
            document.getElementById('close-menu').innerText = t.close;
            document.getElementById('nav-lang').innerText = t.navLang;
            document.getElementById('requestInput').placeholder = t.input;
            document.getElementById('catalogSearch').placeholder = t.searchPlaceholder;
            document.getElementById('warn-title').innerText = t.warnTitle;
            document.getElementById('warn-btn').innerText = t.warnBtn;
            document.getElementById('loading-text').innerText = t.loading;
            document.getElementById('language-overlay').style.display = 'none';
            renderCatalog();
        }

        function filterGames() {
            filterValue = document.getElementById('catalogSearch').value.toLowerCase();
            renderCatalog();
        }

        function renderCatalog() {
            const grid = document.getElementById('gameGrid');
            const filtered = games.filter(g => g.title.toLowerCase().includes(filterValue));
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-40 uppercase font-black tracking-widest">No se encontraron juegos</div>`;
                return;
            }

            grid.innerHTML = filtered.map((g) => `
                <div class="game-card anim-fade-up" onclick="openGame('${g.id}')">
                    <img src="${g.poster}" class="char-img" onerror="this.src='https://placehold.co/400x600/111/fff?text=No+Image'">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-6 text-left">
                        <h3 class="text-2xl font-black italic uppercase font-brand leading-none tracking-tight">${g.title}</h3>
                    </div>
                </div>
            `).join('');
        }

        function openGame(id) {
            const g = games.find(x => x.id === id);
            const t = currentLang.texts;
            
            document.getElementById('detailImg').src = g.screen;
            document.getElementById('detailTitle').innerText = g.title;
            const container = document.getElementById('downloadContainer');
            
            let extra = '';
            if (g.id === 'p5') {
                extra = `
                    <p class="text-xl font-black text-[#00f2ff] uppercase italic font-brand leading-tight mt-6">⚠️ ${t.warnDesc}</p>
                    <p class="text-xs font-bold text-white/40 uppercase tracking-[0.2em] mt-2">${t.credit}: ${g.credits}</p>
                `;
            }

            container.innerHTML = `
                <div class="space-y-6">
                    <button onclick="handleDownload('${g.link}', '${g.title}')" class="btn-action shadow-[0_0_20px_rgba(0,242,255,0.4)]">${t.dlNow}</button>
                    ${extra}
                </div>
            `;
            showView('detail');
        }

        function handleDownload(url, name) {
            pendingUrl = url;
            pendingName = name;
            if (name.includes("Poppy Playtime 5")) {
                document.getElementById('warn-desc').innerText = currentLang.texts.warnDesc;
                document.getElementById('warning-modal').style.display = 'flex';
            } else {
                confirmDownload();
            }
        }

            document.getElementById('warning-modal').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';

                document.getElementById('loading-screen').style.display = 'none';
                window.open(pendingUrl, '_blank');
            }, 3000);
        }

        function sendRequest() {
            const val = document.getElementById('requestInput').value;
            if(!val.trim()) return;
            const t = currentLang.texts;

        }
